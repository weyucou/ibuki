repos:
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-metaschema
        name: Validate JSON Schemas against the Draft 2020-12 meta-schema
        files: ^schema/.*\.schema\.json$
      - id: check-jsonschema
        name: Validate reference template against the proposal schema
        files: ^templates/proposal\.example\.json$
        args:
          - --schemafile
          - schema/v0.1.0/proposal.schema.json

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
